name: 아카이브 업데이트

on:
  schedule:
    - cron: '10 15 * * *'  # 00:10 KST (UTC+9)
  workflow_dispatch:

jobs:
  update:
    name: 아카이브 업데이트
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: 서버에서 변경사항 가져오기
        env:
          DATA_BASE_URL: ${{ secrets.DATA_BASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: python3 .github/scripts/fetch_data.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "아카이브: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi